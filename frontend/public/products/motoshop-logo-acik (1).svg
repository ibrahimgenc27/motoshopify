<?xml version="1.0" standalone="no"?>
<svg id="light-logo" class="w-full max-w-[450px] h-auto drop-shadow-sm" viewBox="0 0 450 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#F97316;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1"/>
                            </linearGradient>
                        </defs>
                        <!-- Speed Lines / Wings -->
                        <path d="M45 40 C 20 40, 10 60, 5 80" stroke="#F97316" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
                        <path d="M35 50 C 15 50, 8 65, 5 85" stroke="#F97316" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
                        
                        <!-- Wheel / Gear Icon -->
                        <circle cx="80" cy="60" r="35" stroke="#1F2937" stroke-width="8"/>
                        <circle cx="80" cy="60" r="12" fill="#F97316"/>
                        <!-- Spokes/Details -->
                        <path d="M80 35 L 80 85" stroke="#1F2937" stroke-width="4"/>
                        <path d="M55 60 L 105 60" stroke="#1F2937" stroke-width="4"/>
                        <path d="M62 42 L 98 78" stroke="#1F2937" stroke-width="4"/>
                        <path d="M62 78 L 98 42" stroke="#1F2937" stroke-width="4"/>
                        
                        <!-- Stylized Bike Frame Top -->
                        <path d="M80 35 Q 110 10 160 25 L 150 45" fill="none" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
                        
                        <!-- Text - Adjusted X coordinates and spacing -->
                        <text x="130" y="75" font-family="'Russo One', sans-serif" font-size="52" fill="#1F2937" letter-spacing="-1">MOTO</text>
                        <!-- Moved SHOP slightly left (x=285) to ensure fit within 450 width -->
                        <text x="285" y="75" font-family="'Russo One', sans-serif" font-size="52" fill="url(#grad1)" font-style="italic" letter-spacing="-1">SHOP</text>
                        
                        <!-- Tagline -->
                        <text x="132" y="98" font-family="'Open Sans', sans-serif" font-size="14" fill="#6B7280" letter-spacing="3" font-weight="600">PARÇA &amp; AKSESUAR</text>
                    </svg>